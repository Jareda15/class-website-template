<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Website Template</title>

    <meta name="theme-color" content="#1a1a1a">
    <link rel="manifest" href="manifest.json">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Class Website">
    <meta name="mobile-web-app-capable" content="yes">

    <meta property="og:title" content="Class Website">
    <meta property="og:description"
        content="Our Official Class Website. Find links to school systems, shared notes, and gallery.">
    <meta property="og:image" content="YOUR_GENERIC_LOGO_URL_HERE">
    <meta property="og:url" content="YOUR_WEBSITE_DOMAIN">
    <meta property="og:type" content="website">
    <link rel="apple-touch-icon" href="Images/icon-192.png">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=3">
    <script src="script.js" defer></script>
</head>

<body class="is-home">

    <nav class="navbar-pill">
        <div class="nav-indicator"></div>
        <a href="YOUR_DISCORD_SERVER_LINK" target="_blank" class="discord-btn"><i class="fab fa-discord"></i>
            Join Our Discord</a>
        <button id="theme-toggle" class="theme-toggle-btn" title="Toggle Theme" aria-label="Toggle theme"><i
                class="fas fa-sun"></i></button>
    </nav>

    <div class="hero-content">
        <h1>OUR CLASS</h1>
        <p class="subtitle">Official prokrastination sponsor</p>

        <button id="actions-toggle-btn" class="actions-toggle-btn" title="Show Links" aria-label="Show links"><i
                class="fas fa-bars"></i></button>

        <div class="action-boxes-container" id="action-boxes">
            <a href="YOUR_SCHOOL_SYSTEM_LINK" class="action-box">
                <i class="fas fa-graduation-cap box-icon" style="color: #00b4db;"></i>
                <span class="box-title">School System</span>
            </a>
            <a href="YOUR_CLASSROOM_OR_TEAMS_LINK" class="action-box">
                <i class="fas fa-chalkboard-user box-icon" style="color: #38ef7d;"></i>
                <span class="box-title">Classroom</span>
            </a>
            <a href="YOUR_SHARED_NOTES_LINK" class="action-box">
                <i class="fas fa-folder-open box-icon" style="color: #4285F4;"></i>
                <span class="box-title">Notes</span>
            </a>
            <a href="YOUR_PHOTO_GALLERY_LINK" class="action-box">
                <i class="fas fa-images box-icon" style="color: #fd79a8;"></i>
                <span class="box-title">Gallery</span>
            </a>
            <a href="#" class="action-box" id="notify-btn">
                <i class="fas fa-bell box-icon" id="notify-icon" style="color: #fca311;"></i>
                <span class="box-title" id="notify-text">Notifications</span>
            </a>
        </div>

        <div class="tables-container">
            <div class="schedule-table-wrapper timeline-wrapper">
                <div class="timeline-header">
                    <h3>Class Duties</h3>
                </div>
                <div class="timeline-container" id="service-timeline">
                    <div class="timeline-item loading-timeline">
                        <div class="timeline-dot"></div>
                        <div class="timeline-content">
                            <div class="skeleton"></div>
                            <div class="skeleton skeleton-sub"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="schedule-table-wrapper timeline-wrapper">
                <div class="timeline-header">
                    <h3>Upcoming Tests</h3>
                </div>
                <div class="timeline-container" id="tests-timeline">
                    <div class="timeline-item loading-timeline">
                        <div class="timeline-dot"></div>
                        <div class="timeline-content">
                            <div class="skeleton"></div>
                            <div class="skeleton skeleton-sub"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('PWA Service Worker running!', reg))
                    .catch(err => console.error('PWA Error:', err));
            });
        }
    </script>
</body>

</html>
